name: Test S3 Connection

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-s3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install boto3
        run: pip install boto3

      - name: Test S3 connection with boto3
        env:
          S3_ENDPOINT: http://s3.xxrom.cn:5246
          S3_BUCKET: "boot"   # 请确认存储桶名称是否正确，如需修改请在此处或使用变量
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          python - <<EOF
          import boto3
          from botocore.exceptions import ClientError
          from botocore.config import Config
          from boto3.s3.transfer import TransferConfig
          import os
          import sys

          endpoint = os.environ['S3_ENDPOINT']
          bucket = os.environ['S3_BUCKET']
          access_key = os.environ['AWS_ACCESS_KEY_ID']
          secret_key = os.environ['AWS_SECRET_ACCESS_KEY']
          region = os.environ.get('AWS_DEFAULT_REGION', 'us-east-1')

          # 创建 S3 客户端，增加超时和重试配置
          s3 = boto3.client(
              's3',
              endpoint_url=endpoint,
              aws_access_key_id=access_key,
              aws_secret_access_key=secret_key,
              region_name=region,
              config=Config(
                  connect_timeout=60,
                  read_timeout=60,
                  retries={'max_attempts': 5}
              )
          )

          print(f"Testing connection to S3 endpoint: {endpoint}")
          print(f"Using bucket: {bucket}")

          # 测试 1: HEAD Bucket
          try:
              s3.head_bucket(Bucket=bucket)
              print("✅ HEAD Bucket succeeded – bucket exists and credentials are valid.")
          except ClientError as e:
              error_code = int(e.response['Error']['Code'])
              if error_code == 404:
                  print(f"❌ Bucket '{bucket}' does not exist.")
              elif error_code == 403:
                  print(f"❌ Access denied for bucket '{bucket}'. Check permissions.")
              else:
                  print(f"❌ HEAD Bucket failed: {e}")
              sys.exit(1)

          # 测试 2: 列出前 3 个对象（验证读权限）
          try:
              response = s3.list_objects_v2(Bucket=bucket, MaxKeys=3)
              if 'Contents' in response:
                  print(f"✅ Successfully listed objects in bucket. First {len(response['Contents'])} objects:")
                  for obj in response['Contents']:
                      print(f"   - {obj['Key']} ({obj['Size']} bytes)")
              else:
                  print("✅ Bucket is accessible but empty.")
          except ClientError as e:
              print(f"⚠️ List objects failed (maybe no read permission): {e}")

          # 测试 3: 上传文件（新增）
          file_path = '/home/runner/work/s3/s3/1.zip'
          if os.path.exists(file_path):
              try:
                  # 使用文件名作为对象键
                  object_key = os.path.basename(file_path)
                  # 设置分片阈值高于文件大小，强制使用单次上传（避免分片上传的 NoSuchUpload 错误）
                  config = TransferConfig(multipart_threshold=50 * 1024 * 1024)  # 50MB
                  with open(file_path, 'rb') as f:
                      s3.upload_fileobj(f, bucket, object_key, Config=config)
                  print(f"✅ Successfully uploaded {file_path} to bucket {bucket} as '{object_key}'")
              except ClientError as e:
                  print(f"❌ Upload failed: {e}")
                  sys.exit(1)
          else:
              print(f"⚠️ File {file_path} not found, skipping upload test. (This file may be created in later steps.)")

          print("All tests completed.")
          EOF
