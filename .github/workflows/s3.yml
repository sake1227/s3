name: Test S3 Connection

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-s3:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@vmian

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install boto3
        run: pip install boto3

      - name: Test S3 connection with boto3
        env:
          S3_ENDPOINT: http://s3.xxrom.cn
          S3_BUCKET: "boot"   # 如果存为 Secret，否则改为直接写死或使用变量
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1   # 自定义 endpoint 时可任意
        run: |
          python - <<EOF
          import boto3
          from botocore.exceptions import ClientError
          import os
          import sys

          endpoint = os.environ['S3_ENDPOINT']
          bucket = os.environ['S3_BUCKET']
          access_key = os.environ['AWS_ACCESS_KEY_ID']
          secret_key = os.environ['AWS_SECRET_ACCESS_KEY']
          region = os.environ.get('AWS_DEFAULT_REGION', 'us-east-1')

          # 创建 S3 客户端
          s3 = boto3.client(
              's3',
              endpoint_url=endpoint,
              aws_access_key_id=access_key,
              aws_secret_access_key=secret_key,
              region_name=region
          )

          print(f"Testing connection to S3 endpoint: {endpoint}")
          print(f"Using bucket: {bucket}")

          # 测试 1: HEAD Bucket
          try:
              s3.head_bucket(Bucket=bucket)
              print("✅ HEAD Bucket succeeded – bucket exists and credentials are valid.")
          except ClientError as e:
              error_code = int(e.response['Error']['Code'])
              if error_code == 404:
                  print(f"❌ Bucket '{bucket}' does not exist.")
              elif error_code == 403:
                  print(f"❌ Access denied for bucket '{bucket}'. Check permissions.")
              else:
                  print(f"❌ HEAD Bucket failed: {e}")
              sys.exit(1)

          # 测试 2: 列出前 3 个对象 (可选，验证读权限)
          try:
              response = s3.list_objects_v2(Bucket=bucket, MaxKeys=3)
              if 'Contents' in response:
                  print(f"✅ Successfully listed objects in bucket. First {len(response['Contents'])} objects:")
                  for obj in response['Contents']:
                      print(f"   - {obj['Key']} ({obj['Size']} bytes)")
              else:
                  print("✅ Bucket is accessible but empty.")
          except ClientError as e:
              print(f"⚠️ List objects failed (maybe no read permission): {e}")

          print("All tests completed.")
          EOF
